name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: npm run lint

      - name: ESLint fix suggestion
        if: steps.eslint.outcome == 'failure'
        run: |
          echo "::error title=ESLint issues detected::Run 'npm run lint:fix' to apply automated fixes, then re-run 'npm run lint'."
          exit 1

      - name: Run Prettier check
        id: prettier
        continue-on-error: true
        run: npm run format:check

      - name: Prettier fix suggestion
        if: steps.prettier.outcome == 'failure'
        run: |
          echo "::error title=Prettier formatting issues detected::Run 'npm run format' to fix formatting, then re-run 'npm run format:check'."
          exit 1
